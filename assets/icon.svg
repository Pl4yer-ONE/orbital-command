<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0099cc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="none" stroke="#30363d" stroke-width="8"/>

  <!-- Orbits -->
  <ellipse cx="256" cy="256" rx="180" ry="60" fill="none" stroke="#484f58" stroke-width="6" transform="rotate(-30 256 256)"/>
  <ellipse cx="256" cy="256" rx="180" ry="60" fill="none" stroke="#00d4ff" stroke-width="6" stroke-dasharray="10 10" transform="rotate(45 256 256)" filter="url(#glow)"/>
  <ellipse cx="256" cy="256" rx="220" ry="220" fill="none" stroke="#30363d" stroke-width="4" stroke-dasharray="4 8"/>

  <!-- Center Earth -->
  <circle cx="256" cy="256" r="64" fill="#0099cc" opacity="0.2" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="48" fill="url(#bg)" stroke="#00d4ff" stroke-width="4"/>
  
  <!-- Grid lines on Earth -->
  <path d="M 208 256 Q 256 320 304 256 Q 256 192 208 256" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <path d="M 256 208 Q 320 256 256 304 Q 192 256 256 208" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>

  <!-- Satellite on orbit -->
  <g transform="translate(100, 100) rotate(45)">
    <!-- Solar panels -->
    <rect x="-32" y="-12" width="24" height="24" fill="#ffcc00" stroke="#ff8c00" stroke-width="2"/>
    <rect x="8" y="-12" width="24" height="24" fill="#ffcc00" stroke="#ff8c00" stroke-width="2"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#ffffff" stroke-width="4"/>
    <!-- Body -->
    <rect x="-8" y="-8" width="16" height="16" fill="#e6edf3" rx="2"/>
    <!-- Antenna -->
    <path d="M 0 8 L -12 24 M 0 8 L 12 24" stroke="#e6edf3" stroke-width="2" fill="none"/>
    <circle cx="0" cy="8" r="3" fill="#00ff88" filter="url(#glow)"/>
    <!-- Signal waves -->
    <path d="M -8 32 Q 0 40 8 32" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.8"/>
    <path d="M -16 40 Q 0 52 16 40" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- Stars/Dots -->
  <circle cx="120" cy="380" r="3" fill="#ffffff" opacity="0.6"/>
  <circle cx="400" cy="140" r="4" fill="#ffffff" opacity="0.8" filter="url(#glow)"/>
  <circle cx="380" cy="400" r="2" fill="#ffffff" opacity="0.4"/>
</svg>
